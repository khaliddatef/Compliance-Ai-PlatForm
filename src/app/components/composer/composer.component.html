<div
  #composerRoot
  class="composer"
  [class.dragging]="dragging"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
>
  <div class="mentions" *ngIf="selectedMentions.length">
    <div class="mention-chip" *ngFor="let mention of selectedMentions; let i = index">
      <span class="mention-chip-label">@{{ mention.name }}</span>
      <button
        type="button"
        class="mention-chip-remove"
        (click)="removeMention(i)"
        aria-label="Remove mentioned file"
      >
        ×
      </button>
    </div>
  </div>

  <div class="attachments" *ngIf="attachments.length">
    <div class="chip" *ngFor="let file of attachments; let i = index">
      <div class="chip-text">
        <span class="name">{{ file.name }}</span>
        <span class="size">{{ formatSize(file.size) }}</span>
      </div>
      <button type="button" class="chip-remove" (click)="removeAttachment(i)" aria-label="Remove attachment">×</button>
    </div>
  </div>

  <div class="input-row">
    <div class="input-wrap">
      <div class="input-shell">
        <button
          class="icon-btn inline-btn attach-btn"
          type="button"
          (click)="fileInput.click()"
          [disabled]="uploading"
          aria-label="Attach documents"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
        </button>

        <textarea
          #composerInput
          [(ngModel)]="draft"
          (input)="autoResize($event)"
          (keydown)="handleKeydown($event)"
          placeholder="Ask about controls, gaps, or evidence you need..."
          aria-label="Message composer"
        ></textarea>

        <button
          class="send inline-btn send-btn"
          type="button"
          (click)="submit()"
          [disabled]="!canSend"
          aria-label="Send"
        >
          <span class="spinner" *ngIf="uploading"></span>
          <svg class="icon" *ngIf="!uploading" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5l6 7-6 7" />
            <path d="M6 12h12" />
          </svg>
        </button>
      </div>

      <div class="mention-overlay" *ngIf="mentionOpen">
        <div class="mention-palette" role="listbox" aria-label="Select a file mention">
          <div class="mention-search-row">
            <span class="mention-search-prefix">@</span>
            <span class="mention-search-text">{{ mentionQuery || 'Type to search for files' }}</span>
          </div>
          <div class="mention-options-list">
            <button
              class="mention-option"
              type="button"
              *ngFor="let option of mentionCandidates; let i = index"
              [class.active]="i === mentionIndex"
              (mousedown)="onMentionMouseDown($event, option)"
            >
              <span class="mention-option-icon">📄</span>
              <span class="mention-option-content">
                <span class="mention-option-name">{{ option.name }}</span>
                <span class="mention-option-meta">{{ option.mimeType || 'document' }}</span>
              </span>
            </button>
            <div class="mention-empty" *ngIf="!mentionCandidates.length">
              No files found for this search.
            </div>
          </div>
        </div>
      </div>

      <input
        #fileInput
        type="file"
        multiple
        accept=".pdf,.docx,.xlsx"
        class="file-input"
        (change)="onFileInput($event)"
      />

      <div class="progress" *ngIf="uploading">
        <div class="progress-track">
          <div class="progress-bar" [style.width.%]="uploadProgress || 10"></div>
        </div>
        <span class="progress-text">{{ uploadProgress ? uploadProgress + '%' : 'Uploading…' }}</span>
      </div>
    </div>
    <!-- <button (click)="reset()">reset</button> -->
  </div>
</div>
